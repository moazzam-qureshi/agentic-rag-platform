name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API lint + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install deps
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Import smoke test
        env:
          PYTHONPATH: services/api/src:services/worker/src:.
        run: |
          uv run python -c "
          import importlib
          for mod in [
            'shared.db_models',
            'shared.indexing',
            'shared.guardrails',
            'shared.tasks',
            'api.config',
            'api.db.session',
            'api.db.opensearch_store',
            'api.agent.rag_agent',
            'api.agent.tools',
            'api.agent.memory',
            'api.broker',
            'worker.config',
            'worker.broker',
            'worker.main',
            'worker.scheduler',
          ]:
            importlib.import_module(mod)
            print(f'OK {mod}')
          "

  web:
    name: Web lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
