# Local-dev overlay for the full Docker stack.
#
# Used with the production compose, NOT instead of it:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# Differences from prod:
#   - Exposes web (3000) and api (8000) to your host so you can hit them
#     without Traefik in front
#   - Builds the web image with NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
#     so the browser talks directly to the api container
#   - Exposes postgres (5433) and opensearch (9200) for debugging
#   - Uses lighter OpenSearch heap (512m) for local machines

services:
  web:
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:3000"

  api:
    ports:
      - "8000:8000"

  postgres:
    ports:
      - "5433:5432"

  opensearch:
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
