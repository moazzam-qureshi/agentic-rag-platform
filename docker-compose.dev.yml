# Local-dev infra only: Postgres + Redis + OpenSearch.
# App services (api, worker, web) run from your host during development.
# For prod deploy on Coolify, see docker-compose.yml (added in a later phase).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docuai
      POSTGRES_PASSWORD: docuai
      POSTGRES_DB: docuai
    ports:
      - "5433:5432"
    volumes:
      - docuai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - docuai_os_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  docuai_pg_data:
  docuai_os_data:
